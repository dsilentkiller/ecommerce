{% extends '../product/base.html' %} {% load static %} {% block content %}
<div class="card">
  <form id="job-main-form" method="get" action="#" class="job-main-form">
    <div class="controls">
      <div class="row align-items-end">
        <div class="col-sm-1 col-lg-2"></div>
        <div class="col-sm-5 col-lg-4 form-group">
          <label for="profession">category name</label>
          <input
            type="text"
            id="category"
            name="category"
            placeholder="category name you are looking for"
            class="form-control"
          />
        </div>
        <div class="col-sm-5 col-lg-4 form-group">
          <label for="price">price</label>
          <input
            type="text"
            id="price"
            name="price"
            placeholder="Any particular price?"
            value=""
            class="form-control"
          />
        </div>
        <div class="col-sm-1 col-lg-2 form-group">
          <button type="submit" name="name" class="btn btn-primary">
            <i class="fa fa-search"></i>
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
{% endblock %}
